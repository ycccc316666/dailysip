<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daily Sip. | 我的手搖飲相遇日記</title>
    <link rel="stylesheet" href="css/style.css">
    
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function(){
            // 點擊新增按鈕：淡入顯示懸浮框
            $("#btn-add-drink").click(function(e){
                e.preventDefault();
                $("#drink-modal").fadeIn(300);
                $("body").css("overflow", "hidden"); // 🆕 彈出時鎖定主網頁滾動，防止雙重滾動
            });

            // 點擊叉叉按鈕：淡出隱藏懸浮框
            $("#btn-close-modal").click(function(){
                $("#drink-modal").fadeOut(300);
                $("body").css("overflow", "auto"); // 🆕 關閉時恢復主網頁滾動
            });

            // 點擊懸浮框外圍半透明處：也能關閉視窗
            $("#drink-modal").click(function(e){
                if($(e.target).hasClass("modal-overlay")) {
                    $(this).fadeOut(300);
                    $("body").css("overflow", "auto");
                }
            });

            // 點擊儲存按鈕：跳出可愛提示並關閉
            $("#btn-submit-drink").click(function(){
                alert("🎉 紀錄成功！(此處為前端模擬，照片與資料已成功寫入你的文青本本裡)");
                $("#drink-modal").fadeOut(300);
                $("body").css("overflow", "auto");
            });
        });
    </script>
</head>
<body>

    <header class="site-header">
        <div class="header-container">
            <div class="logo">
                <a href="index.html">
                    <img src="images/logo.png" alt="Daily Sip. Logo" class="logo-img">
                </a>
            </div>
            <nav class="main-nav">
                <ul>
                    <li><a href="index.html" class="active">首頁</a></li>
                    <li><a href="drinks.html">完整紀錄庫</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <section class="hero-section">
        <div class="hero-content">
            <h2>每天都想喝手搖(´┓`*)</h2>
            <p>挑戰紀錄2026喝的每杯手搖</p>
        </div>
    </section>

    <main class="container">
        <h3 class="section-title"> 最近喝ㄉ手搖</h3>
        
        <div class="drinks-grid">
            
            <div class="drink-card">
                <div class="drink-img-box">
                    <a href="drinks.html#drink01">
                        <img src="images/drink01.jpg" alt="紅心芭樂烏龍奶昔">
                    </a>
                </div>
                <div class="card-meta">
                    <span class="drink-date">📅 2026.06.02</span>
                    <span class="brand-tag">得正</span>
                </div>
                <h4>紅心芭樂烏龍奶昔</h4>     
                <div class="recipe-price-box">
                    <div class="my-recipe">📋 微糖 / 微冰</div>
                    <div class="drink-price">💰 $85 元</div>
                </div>
                <a href="drinks.html#drink01" class="btn">查看詳細點評</a>
            </div>

            <div class="drink-card">
                <div class="drink-img-box">
                    <a href="drinks.html#drink02">
                        <img src="images/drink02.jpg" alt="荔多鮮奶果昔">
                    </a>
                </div>
                <div class="card-meta">
                    <span class="drink-date">📅 2026.05.29</span>
                    <span class="brand-tag">迷客夏</span>
                </div>
                <h4>荔多鮮奶果昔</h4>
                <div class="recipe-price-box">
                    <div class="my-recipe">📋 半糖 / -</div>
                    <div class="drink-price">💰 $60 元</div>
                </div>
                <a href="drinks.html#drink02" class="btn">查看詳細點評</a>
            </div>

            <div class="drink-card">
                <div class="drink-img-box">
                    <a href="drinks.html#drink03">
                        <img src="images/drink03.jpg" alt="楊枝甘露2.0">
                    </a>
                </div>
                <div class="card-meta">
                    <span class="drink-date">📅 2026.05.23</span>
                    <span class="brand-tag">麻古茶坊</span>
                </div>
                <h4>楊枝甘露2.0</h4> 
                <div class="recipe-price-box">
                    <div class="my-recipe">📋 正常糖 / -</div>
                    <div class="drink-price">💰 $90 元</div>
                </div>
                <a href="drinks.html#drink03" class="btn">查看詳細點評</a>
            </div>

        </div> 
        
        <div style="text-align: center; margin-top: 50px;">
            <button id="btn-add-drink" class="custom-btn">+ 新增手搖飲紀錄</button>
        </div>
        
    </main> 

    <div id="drink-modal" class="modal-overlay">
        <div class="modal-card">
            <div class="modal-header">
                <h3>✨ 新增品飲紀錄</h3>
                <span id="btn-close-modal" class="close-icon">&times;</span>
            </div>
            <form id="add-drink-form" onsubmit="event.preventDefault();">
                <div class="form-group">
                    <label>消費日期</label>
                    <input type="date" value="2026-06-07">
                </div>
                
                <div class="form-group">
                    <label>上傳手搖飲照片</label>
                    <input type="file" accept="image/*" class="file-input">
                </div>

                <div class="form-group">
                    <label>品牌店家</label>
                    <input type="text" placeholder="例如：得正、五桐號...">
                </div>
                <div class="form-group">
                    <label>品項名稱</label>
                    <input type="text" placeholder="例如：焙茶珍珠那堤...">
                </div>
                <div class="form-group-row">
                    <div class="form-group">
                        <label>專屬配方</label>
                        <input type="text" placeholder="微糖 / 微冰">
                    </div>
                    <div class="form-group">
                        <label>消費價格</label>
                        <input type="text" placeholder="$65 元">
                    </div>
                </div>
                <div class="form-group">
                    <label>私心評分</label>
                    <select>
                        <option>★★★★★ (極品必喝)</option>
                        <option>★★★★☆ (很好喝)</option>
                        <option>★★★☆☆ (普通平淡)</option>
                        <option>★★☆☆☆ (不太推薦)</option>
                        <option>★☆☆☆☆ (踩雷大風暴)</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>品飲詳細心得手札</label>
                    <textarea rows="3" placeholder="寫點什麼吧..."></textarea>
                </div>
                <button type="button" id="btn-submit-drink" class="modal-submit-btn">儲存紀錄</button>
            </form>
        </div>
    </div>
    
    <footer class="site-footer">
        <p>Designed by hishi</p>
    </footer>

</body>
</html>
